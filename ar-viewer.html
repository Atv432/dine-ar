<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AR Viewer - DineAR</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
body{margin:0;overflow:hidden;font-family:'Poppins',sans-serif}
#backBtn{position:fixed;top:20px;left:20px;background:rgba(255,102,0,0.9);color:#fff;border:none;padding:12px 24px;border-radius:30px;font-weight:600;z-index:999;cursor:pointer}
#startBtn{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#ff6600;color:#fff;border:none;padding:18px 48px;border-radius:40px;font-size:18px;font-weight:700;z-index:999;cursor:pointer;box-shadow:0 8px 24px rgba(255,102,0,0.4)}
#instructions{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:32px 48px;border-radius:20px;text-align:center;z-index:998;display:flex;flex-direction:column;align-items:center;gap:16px}
#instructions h2{font-size:28px;margin:0}
#instructions p{font-size:16px;color:#ccc;margin:0}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:18px;background:rgba(0,0,0,0.7);padding:20px 40px;border-radius:20px;display:none;z-index:1000}
</style>
</head>
<body>
<button id="backBtn" onclick="window.location.href='index.html'">← Back</button>
<div id="instructions">
<h2>🍔 View in AR</h2>
<p>Tap "Start Camera" below, then point your phone at any flat surface or the printed menu card to see the 3D food model appear!</p>
</div>
<button id="startBtn">📷 Start Camera</button>
<div id="loading">Loading 3D model...</div>
<script>
const params=new URLSearchParams(window.location.search);
const dishName=params.get('name')||'Food Item';
document.querySelector('#instructions h2').innerHTML=`🍔 ${dishName}`;
const mindarThree=new window.MINDAR.IMAGE.MindARThree({container:document.body,imageTargetSrc:'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/targets/card.mind'});
const{renderer,scene,camera}=mindarThree;
const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);
const anchor=mindarThree.addAnchor(0);
const loader=new THREE.GLTFLoader();
document.getElementById('loading').style.display='block';
loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Hamburger/glTF-Binary/Hamburger.glb',gltf=>{const model=gltf.scene;model.scale.set(0.5,0.5,0.5);model.position.set(0,-0.5,0);anchor.group.add(model);document.getElementById('loading').style.display='none'},undefined,err=>{console.error(err);alert('Failed to load 3D model')});
document.getElementById('startBtn').addEventListener('click',async()=>{document.getElementById('startBtn').style.display='none';document.getElementById('instructions').style.display='none';await mindarThree.start();renderer.setAnimationLoop(()=>{renderer.render(scene,camera)})});
</script>
</body>
</html>
